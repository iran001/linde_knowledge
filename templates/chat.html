{% extends "base.html" %}

{% block title %}{{ page_title }} - {{ app_name }}{% endblock %}

{% block extra_css %}
<style>
    .chat-wrapper {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 100px);
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
        background: #fafafa;
    }

    .chat-header h2 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        color: #111827;
    }

    .chat-header .powered-by {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: #6b7280;
    }

    .chat-header .powered-by img {
        height: 18px;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #f9fafb;
    }

    .message {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
        flex-direction: row-reverse;
    }

    .message-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.125rem;
        flex-shrink: 0;
    }

    .message.bot .message-avatar {
        background: #1C64F2;
        color: white;
    }

    .message.user .message-avatar {
        background: #e5e7eb;
    }

    .message-content {
        max-width: 70%;
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.6;
        word-wrap: break-word;
    }

    .message.bot .message-content {
        background: white;
        border: 1px solid #e5e7eb;
        color: #374151;
    }

    .message.user .message-content {
        background: #1C64F2;
        color: white;
    }

    .suggested-questions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        padding-left: 48px;
    }

    .suggested-question {
        padding: 6px 12px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        font-size: 0.85rem;
        color: #374151;
        cursor: pointer;
        transition: all 0.2s;
    }

    .suggested-question:hover {
        background: #e5e7eb;
        border-color: #d1d5db;
    }

    .workflow-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        background: #d1fae5;
        color: #065f46;
        font-size: 0.75rem;
        border-radius: 4px;
        margin-bottom: 8px;
    }

    .chat-input-wrapper {
        padding: 16px 20px;
        border-top: 1px solid #e5e7eb;
        background: white;
    }

    .chat-input-container {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .chat-input {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
    }

    .chat-input:focus {
        border-color: #1C64F2;
    }

    .chat-input::placeholder {
        color: #9ca3af;
    }

    .chat-btn {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 50%;
        background: #1C64F2;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }

    .chat-btn:hover {
        background: #1e40af;
    }

    .chat-btn:disabled {
        background: #9ca3af;
        cursor: not-allowed;
    }

    .chat-btn.mic {
        background: #f3f4f6;
        color: #6b7280;
    }

    .chat-btn.mic:hover {
        background: #e5e7eb;
    }

    .typing-indicator {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        width: fit-content;
        font-size: 0.95rem;
        color: #6b7280;
    }

    .typing-indicator .thinking-dots {
        display: inline-flex;
        gap: 2px;
        margin-left: 4px;
    }

    .typing-indicator .thinking-dots span {
        animation: thinkingBlink 1.4s infinite;
        opacity: 0.3;
    }

    .typing-indicator .thinking-dots span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-indicator .thinking-dots span:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes thinkingBlink {
        0%, 60%, 100% { opacity: 0.3; }
        30% { opacity: 1; }
    }

    .welcome-message {
        text-align: center;
        padding: 40px 20px;
        color: #6b7280;
    }

    .welcome-message h3 {
        margin-bottom: 16px;
        color: #111827;
    }

    /* Think 内容样式 */
    .think-content {
        background: #fef3c7;
        border-left: 4px solid #f59e0b;
        padding: 12px 16px;
        margin-bottom: 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        color: #92400e;
    }

    .think-content .think-label {
        font-weight: 600;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .think-content .think-label::before {
        content: "💭";
    }

    .think-content pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: inherit;
        line-height: 1.5;
    }

    /* 最终答案样式 */
    .answer-content {
        background: #f0fdf4;
        border-left: 4px solid #22c55e;
        padding: 12px 16px;
        border-radius: 8px;
    }

    .answer-content .answer-label {
        font-weight: 600;
        margin-bottom: 8px;
        color: #166534;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .answer-content .answer-label::before {
        content: "✅";
    }

    .answer-content pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: inherit;
        line-height: 1.6;
        color: #374151;
    }

    /* 新对话按钮 */
    .new-chat-btn {
        padding: 6px 12px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-size: 0.85rem;
        color: #374151;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .new-chat-btn:hover {
        background: #e5e7eb;
        border-color: #d1d5db;
    }

    .conversation-info {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-left: 10px;
    }

    /* 聊天消息中的图片样式 */
    .message-image {
        max-width: 100%;
        max-height: 400px;
        border-radius: 8px;
        margin: 8px 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: transform 0.2s;
    }

    .message-image:hover {
        transform: scale(1.02);
    }

    .message-content img {
        max-width: 100%;
        max-height: 400px;
        border-radius: 8px;
        margin: 8px 0;
    }

    /* 聊天消息中的链接样式 */
    .message-link {
        color: #1C64F2;
        text-decoration: none;
        border-bottom: 1px solid #1C64F2;
        cursor: pointer;
        transition: all 0.2s;
    }

    .message-link:hover {
        color: #1e40af;
        border-bottom-color: #1e40af;
        background: rgba(28, 100, 242, 0.1);
        padding: 0 2px;
        border-radius: 2px;
    }

    .message-content a {
        color: #1C64F2;
        text-decoration: none;
        border-bottom: 1px solid #1C64F2;
    }

    .message-content a:hover {
        color: #1e40af;
        border-bottom-color: #1e40af;
    }

    /* 图片预览模态框 */
    .image-preview-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    }

    .image-preview-modal.active {
        display: flex;
    }

    .image-preview-modal img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-header">
        <div style="display: flex; align-items: center;">
            <h2>💬 {{ page_title }}</h2>
            <span class="conversation-info" id="conversationInfo"></span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="new-chat-btn" onclick="startNewChat()" title="开始新对话">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新对话
            </button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <!-- 欢迎消息 -->
        <div class="welcome-message" id="welcomeMessage">
            <h3>请问有什么可以帮到你的吗？请告诉我你的问题，我可以进行问题回答。</h3>
            <div class="suggested-questions">
                <span class="suggested-question" onclick="sendQuestion('查询统计工程MTO')">查询统计工程MTO</span>
                <span class="suggested-question" onclick="sendQuestion('查询cad的图纸')">查询cad的图纸</span>
            </div>
        </div>
    </div>

    <div class="chat-input-wrapper">
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="chatInput" placeholder="和 Pedia 聊天"
                   onkeypress="handleKeyPress(event)">
            <button class="chat-btn mic" title="语音输入">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            <button class="chat-btn" id="sendBtn" onclick="sendMessage()" title="发送">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // Dify 配置
    const DIFY_CONFIG = {
        baseUrl: '{{ dify_config.base_url }}',
        apiKey: '{{ dify_config.api_key }}',
        endpoint: '{{ dify_config.chat_messages_endpoint }}'
    };

    // 角色输入变量
    const ROLE_INPUTS = {{ role_inputs | safe }};

    // 用户标识
    const USER_ID = '{{ user.username }}';
    const USER_ROLE = '{{ user_role }}';

    // 从 localStorage 获取保存的 conversation_id，如果没有则为空
    const STORAGE_KEY = 'dify_conversation_id_' + USER_ID;
    let conversationId = localStorage.getItem(STORAGE_KEY) || '';
    let isTyping = false;
    let currentBotMessageId = null;
    let thinkContent = '';
    let answerContent = '';
    let isInThinkTag = false;

    // 保存 conversation_id 到 localStorage
    function saveConversationId(id) {
        if (id) {
            conversationId = id;
            localStorage.setItem(STORAGE_KEY, id);
            console.log('[Conversation] Saved conversation_id:', id);
        }
    }

    // 清除 conversation_id（用于开始新对话）
    function clearConversationId() {
        conversationId = '';
        localStorage.removeItem(STORAGE_KEY);
        console.log('[Conversation] Cleared conversation_id');
    }

    // 发送预设问题
    function sendQuestion(question) {
        document.getElementById('chatInput').value = question;
        sendMessage();
    }

    // 处理回车键
    function handleKeyPress(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();

        if (!message || isTyping) return;

        // 隐藏欢迎消息
        const welcomeMsg = document.getElementById('welcomeMessage');
        if (welcomeMsg) {
            welcomeMsg.style.display = 'none';
        }

        // 添加用户消息
        addMessage('user', message);
        input.value = '';

        // 显示输入中状态
        isTyping = true;
        const typingId = showTypingIndicator();

        try {
            // 调用 Dify API，传递用户消息用于后续保存
            await callDifyAPI(message, typingId);
        } catch (error) {
            console.error('API Error:', error);
            removeTypingIndicator(typingId);
            // 如果是stream开始前的错误，添加错误消息
            if (!currentBotMessageId) {
                addMessage('bot', '抱歉，服务暂时不可用，请稍后重试。');
            }
            isTyping = false;
        }
    }

    // 解析内容，分离 think 标签和答案
    function parseContent(text) {
        const thinkRegex = /<think>([\s\S]*?)<\/think>/g;
        const thinks = [];
        let match;
        let lastIndex = 0;

        while ((match = thinkRegex.exec(text)) !== null) {
            thinks.push(match[1].trim());
            lastIndex = thinkRegex.lastIndex;
        }

        // 提取答案（think标签之后的内容）
        const answer = text.substring(lastIndex).trim();

        return {
            thinks: thinks,
            answer: answer
        };
    }

    // 调用 Dify API (流式响应)
    async function callDifyAPI(userMessageContent, typingId) {
        // 重置状态
        thinkContent = '';
        answerContent = '';
        isInThinkTag = false;
        currentBotMessageId = null;
        let hasReceivedContent = false;

        const response = await fetch(DIFY_CONFIG.baseUrl + DIFY_CONFIG.endpoint, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${DIFY_CONFIG.apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                inputs: ROLE_INPUTS,
                query: userMessageContent,
                response_mode: 'streaming',
                conversation_id: conversationId,
                user: USER_ID,
                files: []
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        // 不立即创建消息容器，等有内容时再创建
        currentBotMessageId = null;

        // 处理流式响应
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n');

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));
                        console.log('[Dify Event]', data.event, data);

                        switch (data.event) {
                            case 'workflow_started':
                                // 工作流开始
                                console.log('[Workflow] Started');
                                break;

                            case 'message':
                            case 'agent_message':
                                // 收到消息片段 - Dify 可能返回 data.answer 或 data.data.text
                                let messageContent = '';
                                if (data.answer) {
                                    messageContent = data.answer;
                                } else if (data.data && data.data.text) {
                                    messageContent = data.data.text;
                                } else if (data.data && typeof data.data === 'string') {
                                    messageContent = data.data;
                                } else if (data.data && data.data.answer) {
                                    messageContent = data.data.answer;
                                } else if (data.data && data.data.content) {
                                    messageContent = data.data.content;
                                }

                                if (messageContent) {
                                    buffer += messageContent;
                                    console.log('[Buffer] Updated, length:', buffer.length);

                                    // 第一次收到内容时，移除打字指示器并创建消息容器
                                    if (!hasReceivedContent) {
                                        hasReceivedContent = true;
                                        removeTypingIndicator(typingId);
                                        currentBotMessageId = addMessage('bot', '', true);
                                    }

                                    // 实时解析并更新显示
                                    const parsed = parseContent(buffer);
                                    updateBotMessage(currentBotMessageId, parsed.thinks, parsed.answer);
                                }

                                // 保存返回的 conversation_id（每个消息事件都可能包含）
                                if (data.conversation_id) {
                                    saveConversationId(data.conversation_id);
                                }
                                break;

                            case 'message_end':
                                // 消息结束，最终解析
                                console.log('[Message End] Buffer length:', buffer.length, 'Content preview:', buffer.substring(0, 100));

                                // 如果还没创建消息容器（没收到内容），移除打字指示器并创建空消息
                                if (!hasReceivedContent) {
                                    removeTypingIndicator(typingId);
                                    currentBotMessageId = addMessage('bot', '', true);
                                }

                                const finalParsed = parseContent(buffer);
                                updateBotMessage(currentBotMessageId, finalParsed.thinks, finalParsed.answer);
                                isTyping = false;

                                // 保存消息到后端（先用户消息，后bot消息）
                                // 优先使用 data.conversation_id，其次是全局的 conversationId
                                const finalConversationId = data.conversation_id || conversationId;
                                console.log('[Save] finalConversationId:', finalConversationId, 'buffer empty:', !buffer);
                                if (finalConversationId) {
                                    // 更新全局 conversationId（首次会话时）
                                    if (data.conversation_id && !conversationId) {
                                        saveConversationId(data.conversation_id);
                                    }
                                    const fullContent = buffer;
                                    const thinkText = finalParsed.thinks.join('\n\n');
                                    // 先保存用户提问
                                    await saveMessageToBackend(finalConversationId, 'user', userMessageContent);
                                    // 再保存bot回复（确保有内容才保存）
                                    if (fullContent || thinkText) {
                                        await saveMessageToBackend(finalConversationId, 'bot', fullContent, thinkText);
                                        console.log('[Save] Bot message saved, length:', fullContent.length);
                                    } else {
                                        console.warn('[Save] Bot message content is empty, skipping save');
                                    }
                                } else {
                                    console.warn('[Save] No conversation_id available, message not saved');
                                }
                                break;

                            case 'workflow_finished':
                                // 工作流结束
                                console.log('[Workflow] Finished:', data.data);
                                break;

                            case 'error':
                                // 错误
                                console.error('[Dify Error]', data);

                                // 移除打字指示器，如果还没创建消息则创建一个显示错误
                                removeTypingIndicator(typingId);
                                if (!currentBotMessageId) {
                                    currentBotMessageId = addMessage('bot', '', true);
                                }
                                updateBotMessage(currentBotMessageId, [], '抱歉，处理请求时发生错误。');
                                isTyping = false;
                                break;
                        }
                    } catch (e) {
                        console.error('Parse error:', e, line);
                    }
                }
            }
        }

        isTyping = false;
        currentBotMessageId = null;
    }

    // 添加消息到界面
    function addMessage(type, content, isStructured = false) {
        const messagesContainer = document.getElementById('chatMessages');
        const messageId = 'msg-' + Date.now();

        let contentHtml;
        if (type === 'bot' && isStructured) {
            // 结构化消息（支持 think 和 answer 分层）
            contentHtml = `
                <div class="message-content-structured" id="${messageId}-content">
                    <!-- think 内容将在这里显示 -->
                    <!-- answer 内容将在这里显示 -->
                </div>
            `;
        } else {
            // 普通消息 - bot 消息需要处理图片
            const processedContent = type === 'bot' ? convertImagesToHtml(content) : escapeHtml(content);
            contentHtml = `<div class="message-content">${processedContent}</div>`;
        }

        const messageHtml = `
            <div class="message ${type}" id="${messageId}">
                <div class="message-avatar">
                    ${type === 'bot' ? '🤖' : '👤'}
                </div>
                ${contentHtml}
            </div>
        `;

        messagesContainer.insertAdjacentHTML('beforeend', messageHtml);
        scrollToBottom();

        return messageId;
    }

    // 更新机器人消息（分层显示 think 和 answer）
    function updateBotMessage(messageId, thinks, answer) {
        const contentEl = document.getElementById(messageId + '-content');
        if (!contentEl) return;

        let html = '';

        // 显示 think 内容（思考过程样式）- 有内容就显示
        if (thinks && thinks.length > 0) {
            const thinkText = thinks.join('\n\n');
            html += `
                <div class="think-content">
                    <div class="think-label">思考过程</div>
                    <pre>${escapeHtml(thinkText)}</pre>
                </div>
            `;
        }

        // 显示答案内容（回答样式，绿色）- 有内容才显示
        if (answer && answer.trim()) {
            // 转换图片 URL 为 img 标签
            const answerWithImages = convertImagesToHtml(answer);
            html += `
                <div class="answer-content">
                    <div class="answer-label">回答</div>
                    <pre>${answerWithImages}</pre>
                </div>
            `;
        }

        contentEl.innerHTML = html;
        scrollToBottom();
    }

    // 更新普通消息内容（兼容旧代码）
    function updateMessage(messageId, content, isBot = false) {
        const messageEl = document.getElementById(messageId);
        if (messageEl) {
            const contentEl = messageEl.querySelector('.message-content');
            if (contentEl) {
                // bot 消息需要处理图片
                contentEl.innerHTML = isBot ? convertImagesToHtml(content) : escapeHtml(content);
                scrollToBottom();
            }
        }
    }

    // 显示输入中状态
    function showTypingIndicator() {
        const messagesContainer = document.getElementById('chatMessages');
        const typingId = 'typing-' + Date.now();

        const typingHtml = `
            <div class="message bot" id="${typingId}" style="padding-left: 48px;">
                <div class="typing-indicator">
                    <span>正在思考</span>
                    <span class="thinking-dots">
                        <span>。</span>
                        <span>。</span>
                        <span>。</span>
                    </span>
                </div>
            </div>
        `;

        messagesContainer.insertAdjacentHTML('beforeend', typingHtml);
        scrollToBottom();

        return typingId;
    }

    // 移除输入中状态
    function removeTypingIndicator(typingId) {
        const typingEl = document.getElementById(typingId);
        if (typingEl) {
            typingEl.remove();
        }
    }

    // 滚动到底部
    function scrollToBottom() {
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // HTML 转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 检测并转换消息中的特殊格式为 HTML
    // 1. ![](http链接) → 渲染成 <img>
    // 2. [xxx](http链接) → 渲染成 <a> 标签，点击通过代理访问
    function convertImagesToHtml(text) {
        if (!text) return '';

        // 先进行 HTML 转义
        let escapedText = escapeHtml(text);

        // 步骤1: 处理 ![](http链接) 格式 - 渲染成图片
        // 匹配 ![](url) 格式，不包括前面有其他字符的情况（避免与 [text](url) 冲突）
        const imagePattern = /!\[([^\]]*)\]\((https?:\/\/[^\s<>")]+)\)/gi;
        escapedText = escapedText.replace(imagePattern, function(match, alt, url) {
            return `<img src="${url}" class="message-image" alt="${alt || '图片'}" onclick="previewImage('${url}')" title="点击查看大图">`;
        });

        // 步骤2: 处理 [xxx](http链接) 格式 - 渲染成可点击链接
        // 匹配 [text](url) 格式，但排除已经被处理的 ![...](...) 图片格式
        const linkPattern = /\[([^\]]+)\]\((https?:\/\/[^\s<>")]+)\)/gi;
        escapedText = escapedText.replace(linkPattern, function(match, linkText, url) {
            // 通过代理接口访问，后端会添加 api_key header
            return `<a href="javascript:void(0)" class="message-link" onclick="openProxyLink('${url}')">${linkText}</a>`;
        });

        // 步骤3: 兼容旧的括号内图片 URL 格式: (http://.../image/...)
        const bracketImagePattern = /\((https?:\/\/[^\s<>"()]+\/(?:image|images|document\/image|file)[^\s<>"()]*)\)/gi;
        escapedText = escapedText.replace(bracketImagePattern, function(match, url) {
            // 如果已经被替换成 img 标签，则跳过
            if (match.includes('<img')) return match;
            return `(<img src="${url}" class="message-image" alt="图片" onclick="previewImage('${url}')" title="点击查看大图">)`;
        });

        return escapedText;
    }

    // 通过代理打开链接（后端会添加 api_key header）
    async function openProxyLink(url) {
        try {
            // 调用后端代理接口
            const response = await fetch('/api/proxy-link', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ url: url })
            });

            if (response.ok) {
                // 如果后端返回成功，下载返回内容
                const blob = await response.blob();
                const contentType = response.headers.get('Content-Type') || 'application/octet-stream';
                
                // 优先从后端返回的 header 中获取文件名（URL 编码，需要解码）
                let filename = response.headers.get('X-Original-Filename');
                
                // 对文件名进行 URL 解码（处理中文等字符）
                if (filename) {
                    try {
                        filename = decodeURIComponent(filename);
                    } catch (e) {
                        console.error('Decode filename error:', e);
                    }
                }
                
                // 如果后端没有提供文件名，从 URL 中提取或使用默认名称
                if (!filename) {
                    filename = 'download';
                    try {
                        const urlObj = new URL(url);
                        const pathParts = urlObj.pathname.split('/');
                        const lastPart = pathParts[pathParts.length - 1];
                        if (lastPart && lastPart.includes('.')) {
                            filename = lastPart;
                        } else {
                            // 根据 Content-Type 猜测扩展名
                            const extMap = {
                                'application/pdf': '.pdf',
                                'image/png': '.png',
                                'image/jpeg': '.jpg',
                                'image/jpg': '.jpg',
                                'image/gif': '.gif',
                                'text/plain': '.txt',
                                'application/json': '.json'
                            };
                            const ext = extMap[contentType] || '';
                            filename = 'download' + ext;
                        }
                    } catch (e) {
                        console.error('Parse URL error:', e);
                    }
                }
                
                // 创建下载链接
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);
                
                console.log('[Proxy Link] Download started:', filename, 'Type:', contentType);
            } else {
                const data = await response.json();
                alert('访问链接失败: ' + (data.detail || '未知错误'));
            }
        } catch (error) {
            console.error('Proxy link error:', error);
            alert('下载失败: ' + error.message);
        }
    }

    // 图片预览功能
    function previewImage(url) {
        let modal = document.getElementById('imagePreviewModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'imagePreviewModal';
            modal.className = 'image-preview-modal';
            modal.innerHTML = '<img src="" alt="预览">';
            modal.onclick = function() {
                this.classList.remove('active');
            };
            document.body.appendChild(modal);
        }
        
        modal.querySelector('img').src = url;
        modal.classList.add('active');
    }

    // 开始新对话
    function startNewChat() {
        // 清除 conversation_id
        clearConversationId();

        // 清空消息列表
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.innerHTML = `
            <div class="welcome-message" id="welcomeMessage">
                <h3>请问有什么可以帮到你的吗？请告诉我你的问题，我可以进行问题回答。</h3>
                <div class="suggested-questions">
                    <span class="suggested-question" onclick="sendQuestion('会员转化率')">会员转化率</span>
                    <span class="suggested-question" onclick="sendQuestion('介绍IHG的企微管家')">介绍IHG的企微管家</span>
                    <span class="suggested-question" onclick="sendQuestion('介绍&quot;微笑吧！外星小神兽&quot;活动')">介绍"微笑吧！外星小神兽"活动</span>
                    <span class="suggested-question" onclick="sendQuestion('导致会员招募无法成为&quot;合格招募&quot;的常见原因有哪些？')">导致会员招募无法成为"合格招募"的常见原因有哪些？</span>
                    <span class="suggested-question" onclick="sendQuestion('会员合规的审核流程')">会员合规的审核流程</span>
                    <span class="suggested-question" onclick="sendQuestion('酒店开通微信支付（预付）账户需完成哪些操作？')">酒店开通微信支付（预付）账户需完成哪些操作？</span>
                    <span class="suggested-question" onclick="sendQuestion('易宝支付操作流程')">易宝支付操作流程</span>
                </div>
            </div>
        `;

        // 更新会话信息显示
        updateConversationInfo();

        // 聚焦输入框
        document.getElementById('chatInput').focus();
    }

    // 更新会话信息显示
    function updateConversationInfo() {
        const infoEl = document.getElementById('conversationInfo');
        if (infoEl) {
            if (conversationId) {
                infoEl.textContent = `(会话: ${conversationId.substring(0, 8)}...)`;
                infoEl.title = `当前会话ID: ${conversationId}`;
            } else {
                infoEl.textContent = '(新会话)';
                infoEl.title = '新会话，对话将创建新的 conversation_id';
            }
        }
    }

    // 加载历史对话
    async function loadChatHistory() {
        if (!conversationId) {
            console.log('[History] No conversation_id, skip loading');
            return;
        }

        try {
            console.log('[History] Loading history for:', conversationId);
            const response = await fetch(`/api/chat-history/${conversationId}`, {
                method: 'GET',
                credentials: 'same-origin'
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            if (data.success && data.history && data.history.length > 0) {
                console.log('[History] Loaded', data.history.length, 'messages');

                // 隐藏欢迎消息
                const welcomeMsg = document.getElementById('welcomeMessage');
                if (welcomeMsg) {
                    welcomeMsg.style.display = 'none';
                }

                // 渲染历史消息
                for (const msg of data.history) {
                    if (msg.role === 'user') {
                        addMessage('user', msg.content);
                    } else if (msg.role === 'bot') {
                        // 解析 think 和 answer
                        const parsed = parseContent(msg.content);
                        const botMsgId = addMessage('bot', '', true);
                        updateBotMessage(botMsgId, parsed.thinks, parsed.answer);
                    }
                }

                // 滚动到底部
                scrollToBottom();
            }
        } catch (error) {
            console.error('[History] Error loading history:', error);
        }
    }

    // 保存消息到后端
    async function saveMessageToBackend(conversationId, role, content, thinkContent = '') {
        try {
            const response = await fetch('/api/chat-history/save', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    conversation_id: conversationId,
                    role: role,
                    content: content,
                    think_content: thinkContent
                })
            });

            if (!response.ok) {
                console.error('[Save] Failed to save message:', response.status);
            } else {
                console.log('[Save] Message saved successfully');
            }
        } catch (error) {
            console.error('[Save] Error saving message:', error);
        }
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', async function() {
        document.getElementById('chatInput').focus();
        updateConversationInfo();
        console.log('[Conversation] Current conversation_id:', conversationId || '(empty - new chat)');

        // 加载历史对话
        await loadChatHistory();
    });
</script>
